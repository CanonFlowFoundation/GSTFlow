name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Restore F# dependencies
      run: dotnet restore

    - name: Build F# Solution
      run: dotnet build --no-restore

    - name: Run CLI Tests (NativeAOT mode verification)
      run: |
        echo "Testing Fixture 1"
        dotnet run --project GSTFlow.Cli/GSTFlow.Cli.fsproj -- --validate fixtures/fixture_1_intrastate_b2b.json
        echo "Testing Fixture 2"
        dotnet run --project GSTFlow.Cli/GSTFlow.Cli.fsproj -- --validate fixtures/fixture_2_intrastate_b2c.json
        echo "Testing Fixture 3 (Falsifier - expected to fail)"
        dotnet run --project GSTFlow.Cli/GSTFlow.Cli.fsproj -- --validate fixtures/fixture_3_falsifier.json || true

    - name: Restore Local Tools (Fable)
      run: dotnet tool restore

    - name: Compile Wasm (Fable to TS)
      run: dotnet fable GSTFlow.Wasm -o playground/src/fable --lang typescript

    - name: Install Playground Dependencies
      working-directory: ./playground
      run: npm ci || npm install

    - name: Run D0 Agreement Tests (JS vs CLI)
      working-directory: ./playground
      run: npx tsx test_fable.ts
