name: Build GSTFlow Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compile F# to TypeScript (Fable)
        run: |
          dotnet tool restore
          dotnet fable GSTFlow.Wasm -o playground/src/fable --lang ts

      - name: Install Dependencies
        working-directory: playground
        run: npm ci

      - name: Build Web App
        working-directory: playground
        run: npm run build

      - name: Sync Capacitor
        working-directory: playground
        run: npx cap sync android

      - name: Build APK
        working-directory: playground/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GSTFlow-Android-Debug
          path: playground/android/app/build/outputs/apk/debug/app-debug.apk
