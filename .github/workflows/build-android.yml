name: Build GSTFlow Android APK

on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Compile F# to Dart
        run: |
          dotnet tool restore
          dotnet fable GSTFlow.Core -o flutter_app/lib/fable/Core --lang dart
          dotnet fable GSTFlow.Rules -o flutter_app/lib/fable/Rules --lang dart

      - name: Build Flutter APK
        working-directory: flutter_app
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GSTFlow-Android-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
